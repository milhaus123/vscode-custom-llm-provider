<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360" font-family="'Segoe UI', system-ui, sans-serif">
  <!-- Background -->
  <rect width="680" height="360" fill="#0a0a0a" rx="8"/>

  <!-- Browser chrome -->
  <rect width="680" height="36" fill="#2a2a2a" rx="8"/>
  <rect y="28" width="680" height="8" fill="#2a2a2a"/>
  <circle cx="14" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="30" cy="18" r="5" fill="#febc2e"/>
  <circle cx="46" cy="18" r="5" fill="#28c840"/>
  <!-- Address bar -->
  <rect x="64" y="8" width="552" height="20" rx="10" fill="#3a3a3a"/>
  <text x="340" y="22" text-anchor="middle" fill="#9e9e9e" font-size="11">modelstudio.console.alibabacloud.com — Coding Plan</text>

  <!-- Page header -->
  <rect x="0" y="36" width="680" height="54" fill="#ff6a00"/>
  <text x="28" y="68" fill="#ffffff" font-size="22" font-weight="700">Alibaba Cloud Model Studio</text>
  <text x="500" y="68" fill="rgba(255,255,255,0.8)" font-size="13">Coding Plan  ·  EFM</text>

  <!-- Sidebar -->
  <rect x="0" y="90" width="180" height="270" fill="#111111"/>
  <rect x="0" y="90" width="180" height="30" fill="#1a1a1a"/>
  <text x="14" y="110" fill="#9e9e9e" font-size="11" font-weight="600" letter-spacing="0.5">NAVIGATION</text>
  <rect x="0" y="130" width="180" height="32" fill="#ff6a00" fill-opacity="0.15"/>
  <rect x="0" y="130" width="3" height="32" fill="#ff6a00"/>
  <text x="16" y="150" fill="#ff6a00" font-size="13" font-weight="600">📋 Coding Plan</text>
  <text x="16" y="182" fill="#9e9e9e" font-size="13">🤖 Model Inference</text>
  <text x="16" y="212" fill="#9e9e9e" font-size="13">🔧 Fine-tuning</text>
  <text x="16" y="242" fill="#9e9e9e" font-size="13">📊 Evaluation</text>
  <text x="16" y="272" fill="#9e9e9e" font-size="13">🔑 API Keys</text>
  <text x="16" y="302" fill="#9e9e9e" font-size="13">📖 Documentation</text>

  <!-- Main content -->
  <rect x="188" y="90" width="492" height="270" fill="#141414"/>

  <!-- Page title -->
  <text x="204" y="118" fill="#ffffff" font-size="16" font-weight="700">Coding Plan — AI-powered development</text>
  <text x="204" y="138" fill="#9e9e9e" font-size="12">Use Qwen Coder models directly in your IDE via GitHub Copilot Chat</text>

  <!-- Cards row -->
  <!-- Card 1 -->
  <rect x="204" y="152" width="140" height="80" rx="6" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="214" y="174" fill="#ff6a00" font-size="18">⚡</text>
  <text x="234" y="174" fill="#ffffff" font-size="13" font-weight="600">Agent Mode</text>
  <text x="214" y="194" fill="#9e9e9e" font-size="11">Full agentic task</text>
  <text x="214" y="210" fill="#9e9e9e" font-size="11">execution in VS Code</text>

  <!-- Card 2 -->
  <rect x="354" y="152" width="140" height="80" rx="6" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="364" y="174" fill="#ff6a00" font-size="18">🔧</text>
  <text x="384" y="174" fill="#ffffff" font-size="13" font-weight="600">Tool Calling</text>
  <text x="364" y="194" fill="#9e9e9e" font-size="11">Edit files, run tests,</text>
  <text x="364" y="210" fill="#9e9e9e" font-size="11">search codebase</text>

  <!-- Card 3 -->
  <rect x="504" y="152" width="168" height="80" rx="6" fill="#1e1e1e" stroke="#333333" stroke-width="1"/>
  <text x="514" y="174" fill="#ff6a00" font-size="18">🧠</text>
  <text x="534" y="174" fill="#ffffff" font-size="13" font-weight="600">Qwen3 Coder</text>
  <text x="514" y="194" fill="#9e9e9e" font-size="11">State-of-the-art</text>
  <text x="514" y="210" fill="#9e9e9e" font-size="11">coding model</text>

  <!-- API endpoint display -->
  <rect x="204" y="248" width="468" height="36" rx="4" fill="#0d0d0d" stroke="#333333" stroke-width="1"/>
  <text x="216" y="265" fill="#555555" font-size="11">Endpoint</text>
  <text x="216" y="279" fill="#ce9178" font-size="11" font-family="monospace">https://coding-intl.dashscope.aliyuncs.com/v1</text>

  <!-- Connect button -->
  <rect x="204" y="298" width="160" height="34" rx="6" fill="#ff6a00"/>
  <text x="284" y="319" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Connect to VS Code →</text>

  <!-- Caption -->
  <rect x="0" y="334" width="680" height="26" fill="#ff6a00"/>
  <text x="340" y="351" text-anchor="middle" fill="#ffffff" font-size="11">This extension was developed primarily for use with Alibaba Cloud Coding Plan</text>
</svg>
