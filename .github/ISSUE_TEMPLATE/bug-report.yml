name: 🐛 Bug Report
description: Report a bug or unexpected behavior in the Custom LLM Provider extension
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - milhaus123
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help with investigation.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug
      placeholder: The extension does not...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Add provider with URL '...'
        2. Run command '...'
        3. Select model '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      description: Available in VS Code → Extensions → Custom LLM Provider
      placeholder: e.g., 0.4.4
    validations:
      required: true

  - type: input
    id: vscode-version
    attributes:
      label: VS Code Version
      description: Help → About
      placeholder: e.g., 1.98.0
    validations:
      required: true

  - type: dropdown
    id: provider-type
    attributes:
      label: Provider Type
      description: Which provider(s) are affected?
      options:
        - Alibaba DashScope
        - OpenRouter
        - Other OpenAI-compatible
        - Multiple providers
    validations:
      required: false

  - type: input
    id: model
    attributes:
      label: Model
      description: Which model were you using?
      placeholder: e.g., qwen3-coder-plus

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Check VS Code Developer Tools (Help → Toggle Developer Tools → Console)
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
