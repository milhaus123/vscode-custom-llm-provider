name: ✨ Feature Request
description: Suggest an idea for the Custom LLM Provider extension
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - milhaus123
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible to help us understand your idea.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see
      placeholder: It would be great if the extension could...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Solutions
      description: Describe any alternative solutions or workarounds you've considered

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: How would this feature benefit you and other users?
      placeholder: This would help me to...

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low — Nice to have
        - Medium — Would improve my workflow
        - High — Blocking my use case
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or screenshots here
